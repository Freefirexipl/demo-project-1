<!DOCTYPE html>
<html>
<head>
    <title>Cyber Security Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fafafa;
        }

        .container {
            width: 300px;
            margin: 120px auto;
            background: white;
            padding: 25px;
            border: 1px solid #ddd;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        .warning {
            color: red;
            font-size: 14px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Login Simulation</h2>

    <p class="warning">
        ⚠️ Educational Cybersecurity Demo (Not a real login page)
    </p>

    <form action="loading.html" method="GET">
        <input type="text" name="user" placeholder="Enter Sample Username"><br>
        <input type="password" name="pass" placeholder="Enter Sample Password"><br>
        <button type="submit">Run Simulation</button>
    </form>
</div>

</body>
</html>
